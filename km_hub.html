  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>KM Smart Hub | ศูนย์ฝึกอาชีพจตุจักร</title>
  <style>
    :root{
      --bma:#005C46; --bma2:#047857; --gold:#d6a642; --bg:#f5f7f6; --card:#ffffff;
      --text:#18342d; --muted:#60756e; --line:#dbe7e3; --shadow:0 16px 34px rgba(0,92,70,.10);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%; scroll-behavior:smooth}
    body{margin:0; min-height:100dvh; font-family:Sarabun, Tahoma, sans-serif; background:linear-gradient(180deg,#eef7f3,#f7faf9 42%,#fff); color:var(--text); padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
    .app{max-width:1180px; margin:auto; padding:18px}
    .hero{background:linear-gradient(135deg,var(--bma),var(--bma2)); color:#fff; border-radius:28px; padding:22px; box-shadow:var(--shadow); position:relative; overflow:hidden}
    .hero:after{content:""; position:absolute; right:-70px; top:-70px; width:210px; height:210px; border-radius:50%; background:rgba(255,255,255,.12)}
    .kicker{font-weight:700; opacity:.9; letter-spacing:.02em}
    h1{margin:8px 0 6px; font-size:clamp(26px,5vw,42px); line-height:1.15}
    .subtitle{margin:0; color:rgba(255,255,255,.88); font-size:16px}
    .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:16px 0}
    .stat{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:14px; box-shadow:0 8px 20px rgba(0,0,0,.04)}
    .stat strong{display:block; font-size:28px; color:var(--bma); line-height:1}
    .stat span{font-size:13px; color:var(--muted)}
    .toolbar{position:sticky; top:0; z-index:10; margin:14px 0; background:rgba(245,247,246,.88); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); padding:12px 0}
    .controls{display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center}
    input,select,button{font:inherit; min-height:46px; border-radius:16px; border:1px solid var(--line); background:#fff; color:var(--text); padding:0 14px}
    input{width:100%}
    button{cursor:pointer; font-weight:700; background:var(--bma); color:#fff; border-color:var(--bma)}
    button.secondary{background:#fff; color:var(--bma)}
    .note{margin:6px 2px 0; font-size:13px; color:var(--muted)}
    .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding:8px 0 30px}
    .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:0 10px 24px rgba(0,0,0,.05)}
    .thumb{position:relative; aspect-ratio:4/3; background:#e8f1ee; overflow:hidden}
    .thumb img{width:100%; height:100%; object-fit:cover; display:block}
    .badge{position:absolute; left:12px; top:12px; padding:7px 10px; border-radius:999px; font-weight:700; font-size:13px; color:#fff; background:rgba(0,92,70,.92)}
    .badge.ss{background:rgba(214,166,66,.94); color:#2b2108}
    .content{padding:14px}
    .title{margin:0 0 6px; font-size:19px; font-weight:800}
    .meta{margin:0; color:var(--muted); font-size:14px}
    .empty{text-align:center; padding:40px 12px; color:var(--muted); background:#fff; border:1px dashed var(--line); border-radius:22px; grid-column:1/-1}
    .admin{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    #fileInput{display:none}
    @media (max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:640px){
      .app{padding:12px} .hero{border-radius:22px; padding:18px} .stats{grid-template-columns:repeat(3,1fr); gap:8px}
      .stat{padding:12px 8px; text-align:center} .stat strong{font-size:24px} .stat span{font-size:12px}
      .controls{grid-template-columns:1fr; gap:8px} .grid{grid-template-columns:1fr; gap:12px}
      button,select,input{width:100%; min-height:48px} .admin{display:grid; grid-template-columns:1fr 1fr; gap:8px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="kicker">ศูนย์ฝึกอาชีพกรุงเทพมหานคร เขตจตุจักร</div>
      <h1>KM Smart Hub</h1>
      <p class="subtitle">คลังภาพและองค์ความรู้รายวิชา ใช้งานง่ายบนคอมพิวเตอร์ iPhone และ iPad</p>
    </section>

    <section class="stats" aria-label="สถิติข้อมูล">
      <div class="stat"><strong id="totalCount">0</strong><span>รายการทั้งหมด</span></div>
      <div class="stat"><strong id="mfCount">0</strong><span>จันทร์–ศุกร์</span></div>
      <div class="stat"><strong id="ssCount">0</strong><span>เสาร์–อาทิตย์</span></div>
    </section>

    <section class="toolbar">
      <div class="controls">
        <input id="search" type="search" placeholder="ค้นหาวิชา เช่น นวดไทย / คอมพิวเตอร์ / เสริมสวย" autocomplete="off" />
        <select id="typeFilter" aria-label="กรองประเภทวันเรียน">
          <option value="ALL">ทุกประเภท</option>
          <option value="MF">จันทร์–ศุกร์</option>
          <option value="SS">เสาร์–อาทิตย์</option>
        </select>
        <button class="secondary" id="resetBtn" type="button">ล้างตัวกรอง</button>
      </div>
      <p class="note">ออกแบบใหม่ให้เหลือเฉพาะฐานข้อมูลที่มีจริง: รูปภาพรายวิชา + ประเภทวันเรียน + การค้นหา/กรอง</p>
      <div class="admin">
        <button id="exportBtn" type="button">Export JSON</button>
        <button id="importBtn" type="button" class="secondary">Import JSON</button>
        <button id="restoreBtn" type="button" class="secondary">คืนค่าตั้งต้น</button>
        <input id="fileInput" type="file" accept="application/json,.json" />
      </div>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

const STORAGE_KEY = 'km-smart-hub-items-v2';
const $ = (id) => document.getElementById(id);
let items = loadItems();

function loadItems() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return normalize(JSON.parse(saved));
  } catch (e) { console.warn('Load local data failed', e); }
  return normalize(DEFAULT_ITEMS);
}
function saveItems() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
function normalize(list) {
  return (Array.isArray(list) ? list : []).filter(x => x && x.imageUrl).map((x, i) => {
    const type = String(x.type || '').toUpperCase() === 'SS' ? 'SS' : 'MF';
    const scheduleTh = type === 'SS' ? 'เสาร์–อาทิตย์' : 'จันทร์–ศุกร์';
    const titleTh = x.titleTh || cleanTitle(x.name || x.id || `รายการที่ ${i+1}`);
    return {...x, id:x.id || `item_${i}`, type, scheduleTh, titleTh, searchText:[titleTh, x.name, type, scheduleTh].join(' ').toLowerCase()};
  });
}
function cleanTitle(name) {
  return String(name).replace(/[-_]/g,' ').replace(/(mf|ss|jpg|png|jpeg|webp)/gi,'').replace(/\s+/g,' ').trim() || 'ไม่ระบุชื่อวิชา';
}
function render() {
  const q = $('search').value.trim().toLowerCase();
  const type = $('typeFilter').value;
  const filtered = items.filter(item => (type === 'ALL' || item.type === type) && (!q || item.searchText.includes(q)));
  $('totalCount').textContent = items.length;
  $('mfCount').textContent = items.filter(x => x.type === 'MF').length;
  $('ssCount').textContent = items.filter(x => x.type === 'SS').length;
  $('grid').innerHTML = filtered.length ? filtered.map(cardHTML).join('') : '<div class="empty">ไม่พบรายการตามเงื่อนไขที่ค้นหา</div>';
}
function cardHTML(item) {
  const safeTitle = escapeHTML(item.titleTh);
  const safeMeta = escapeHTML(item.scheduleTh);
  const safeUrl = escapeHTML(item.imageUrl);
  const cls = item.type === 'SS' ? 'badge ss' : 'badge';
  return `<article class="card"><div class="thumb"><img src="${safeUrl}" alt="${safeTitle}" loading="lazy" onerror="this.style.display='none';this.parentNode.style.background='linear-gradient(135deg,#dfeee9,#fff6dc)'"><span class="${cls}">${safeMeta}</span></div><div class="content"><h2 class="title">${safeTitle}</h2><p class="meta">ประเภท: ${safeMeta}</p></div></article>`;
}
function escapeHTML(s) { return String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
$('search').addEventListener('input', render);
$('typeFilter').addEventListener('change', render);
$('resetBtn').addEventListener('click', () => { $('search').value=''; $('typeFilter').value='ALL'; render(); });
$('restoreBtn').addEventListener('click', () => { if(confirm('ต้องการคืนค่าข้อมูลตั้งต้นใช่หรือไม่?')) { items = normalize(DEFAULT_ITEMS); saveItems(); render(); } });
$('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `km_backup_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'_')}.json`; a.click(); URL.revokeObjectURL(a.href);
});
$('importBtn').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files?.[0]; if(!file) return;
  try { items = normalize(JSON.parse(await file.text())); saveItems(); render(); alert('นำเข้าข้อมูลเรียบร้อย'); }
  catch(err) { alert('ไฟล์ JSON ไม่ถูกต้อง'); console.error(err); }
  e.target.value = '';
});
render();
</script>
