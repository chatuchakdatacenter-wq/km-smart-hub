<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KM Smart Hub</title>
<style>
:root{
--bma:#005C46;
--bma2:#0b7a5d;
--bg:#eef4f1;
--card:#ffffff;
--text:#16352d;
--muted:#6c7f78;
--radius:24px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:var(--bg);
color:var(--text);
padding:18px;
}
.container{
max-width:760px;
margin:auto;
}
.hero{
background:linear-gradient(135deg,var(--bma),var(--bma2));
color:#fff;
padding:24px;
border-radius:32px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
position:relative;
overflow:hidden;
}
.hero:after{
content:"";
position:absolute;
width:240px;
height:240px;
background:rgba(255,255,255,.08);
border-radius:50%;
right:-60px;
top:-60px;
}
.hero small{
opacity:.9;
font-size:14px;
}
.hero h1{
margin:10px 0 8px;
font-size:42px;
line-height:1;
}
.hero p{
margin:0;
font-size:18px;
line-height:1.5;
opacity:.92;
max-width:500px;
}
.search-box{
margin-top:18px;
display:flex;
gap:12px;
flex-direction:column;
}
.search-box input,.search-box select{
width:100%;
padding:18px 20px;
border:none;
border-radius:20px;
font-size:18px;
background:#fff;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}
.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin:18px 0;
}
.kpi{
background:#fff;
border-radius:24px;
padding:18px 10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}
.kpi strong{
display:block;
font-size:42px;
color:var(--bma);
}
.kpi span{
font-size:15px;
color:var(--muted);
}
.section-title{
margin:22px 4px 14px;
font-size:22px;
font-weight:700;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:16px;
}
.card{
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,.06);
transition:.2s ease;
cursor:pointer;
}
.card:hover{transform:translateY(-2px)}
.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
display:block;
}
.card-body{
padding:14px;
}
.card-body h3{
margin:0 0 8px;
font-size:17px;
line-height:1.3;
}
.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
font-size:13px;
background:#e7f3ee;
color:var(--bma);
font-weight:600;
}
.admin-toggle{
margin:28px 0 14px;
background:#fff;
padding:18px 22px;
border-radius:24px;
font-weight:700;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}
.admin-panel{
display:none;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:30px;
}
.admin-panel.show{display:grid}
.btn{
border:none;
padding:16px;
border-radius:20px;
font-size:16px;
font-weight:700;
cursor:pointer;
}
.primary{background:var(--bma);color:#fff}
.secondary{background:#fff;color:var(--bma);border:2px solid var(--bma)}
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999;
}
.lightbox.show{display:flex}
.lightbox img{
max-width:100%;
max-height:90vh;
border-radius:20px;
}
.close{
position:absolute;
right:20px;
top:20px;
font-size:42px;
color:#fff;
cursor:pointer;
}
@media(max-width:640px){
.hero h1{font-size:34px}
.hero p{font-size:16px}
.kpis{gap:10px}
.kpi strong{font-size:34px}
.grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<small>ศูนย์ฝึกอาชีพกรุงเทพมหานคร เขตจตุจักร</small>
<h1>KM Smart Hub</h1>
<p>คลังภาพและองค์ความรู้รายวิชา รองรับ iPhone, iPad และคอมพิวเตอร์</p>
</div>
<div class="search-box">
<input type="text" id="search" placeholder="🔍 ค้นหารายวิชา เช่น นวดไทย / คอมพิวเตอร์ / เสริมสวย">
<select id="filter">
<option value="all">ทุกประเภท</option>
<option value="MF">จันทร์–ศุกร์</option>
<option value="SS">เสาร์–อาทิตย์</option>
</select>
</div>
<div class="kpis">
<div class="kpi"><strong id="allCount">34</strong><span>รายการทั้งหมด</span></div>
<div class="kpi"><strong id="mfCount">18</strong><span>จันทร์–ศุกร์</span></div>
<div class="kpi"><strong id="ssCount">16</strong><span>เสาร์–อาทิตย์</span></div>
</div>
<div class="section-title">📚 รายวิชา</div>
<div class="grid" id="grid"></div>
<div class="admin-toggle" onclick="toggleAdmin()">
<span>⚙️ จัดการข้อมูล</span>
<span id="arrow">＋</span>
</div>
<div class="admin-panel" id="adminPanel">
<button class="btn primary">Export JSON</button>
<button class="btn secondary">Import JSON</button>
<button class="btn secondary" style="grid-column:1/-1">คืนค่าตั้งต้น</button>
</div>
</div>
<div class="lightbox" id="lightbox">
<div class="close" onclick="closeLightbox()">×</div>
<img id="lightboxImg" src="">
</div>
<script>
const courses=[
{name:'นวดไทย',type:'MF',img:'https://placehold.co/600x600?text=Thai+Massage'},
{name:'เสริมสวย',type:'SS',img:'https://placehold.co/600x600?text=Beauty'},
{name:'คอมพิวเตอร์เบื้องต้น',type:'SS',img:'https://placehold.co/600x600?text=Computer'},
{name:'ตัดผมชาย',type:'MF',img:'https://placehold.co/600x600?text=Barber'},
{name:'ทำขนมไทย',type:'MF',img:'https://placehold.co/600x600?text=Dessert'},
{name:'เพ้นท์เล็บ',type:'SS',img:'https://placehold.co/600x600?text=Nail+Art'}
];
const grid=document.getElementById('grid');
function render(){
const q=document.getElementById('search').value.toLowerCase();
const f=document.getElementById('filter').value;
grid.innerHTML='';
const filtered=courses.filter(c=>{
const matchSearch=c.name.toLowerCase().includes(q);
const matchType=f==='all'||c.type===f;
return matchSearch&&matchType;
});
filtered.forEach(c=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<img src="${c.img}" alt="${c.name}"><div class="card-body"><h3>${c.name}</h3><span class="badge">${c.type==='MF'?'จันทร์–ศุกร์':'เสาร์–อาทิตย์'}</span></div>`;
card.onclick=()=>openLightbox(c.img);
grid.appendChild(card);
});
}
function toggleAdmin(){
const panel=document.getElementById('adminPanel');
const arrow=document.getElementById('arrow');
panel.classList.toggle('show');
arrow.textContent=panel.classList.contains('show')?'−':'＋';
}
function openLightbox(src){
document.getElementById('lightbox').classList.add('show');
document.getElementById('lightboxImg').src=src;
}
function closeLightbox(){
document.getElementById('lightbox').classList.remove('show');
}
document.getElementById('lightbox').addEventListener('click',e=>{
if(e.target.id==='lightbox')closeLightbox();
});
document.getElementById('search').addEventListener('input',render);
document.getElementById('filter').addEventListener('change',render);
render();
</script>
</body>
</html>
