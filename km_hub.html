<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>KM Smart Hub - iOS Ready</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bma:#005C46; --bma2:#047857; --sky:#38bdf8; --bg:#f0f4f8; --ink:#1e293b; --muted:#64748b;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; min-height:100%; font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--ink); }
    body { min-height:100dvh; display:flex; overflow:hidden; }
    button, input { font:inherit; }
    button { touch-action:manipulation; }
    .sidebar { width:320px; background:#1e293b; color:#fff; display:flex; flex-direction:column; flex-shrink:0; z-index:10; }
    .sidebar-header { padding:calc(18px + var(--safe-top)) 18px 16px; text-align:center; border-bottom:1px solid #334155; }
    .sidebar-header h2 { font-family:'Kanit'; color:var(--sky); margin:0 0 4px; letter-spacing:.3px; }
    .add-btn { background:linear-gradient(135deg,var(--bma),var(--bma2) 55%,#10b981); color:#fff; margin:14px; padding:12px; border-radius:40px; border:0; font-family:'Kanit'; font-weight:700; cursor:pointer; }
    .kpi-box { padding:0 14px 12px; display:flex; gap:12px; }
    .kpi-card { flex:1; background:#0f172a; border-radius:14px; padding:12px; text-align:center; cursor:pointer; border:2px solid transparent; }
    .kpi-card.active { border-color:var(--sky); background:#26364f; }
    .kpi-card h5 { margin:0 0 4px; font-size:.82rem; opacity:.92; }
    .kpi-card .count { font-size:1.65rem; font-weight:700; }
    .subject-list { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; padding:10px 12px; }
    .subject-item { background:#0f172a; padding:14px; margin-bottom:9px; border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .subject-item.active { background:#2563eb; }
    .subject-item span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .btn-danger-sm { background:transparent; border:0; color:#fca5a5; cursor:pointer; font-size:1rem; padding:6px; }
    .data-panel { padding:12px 14px calc(14px + var(--safe-bottom)); border-top:1px solid #334155; display:grid; gap:8px; }
    .data-panel button { width:100%; padding:11px; border-radius:10px; border:0; font-family:'Kanit'; cursor:pointer; font-weight:700; color:#fff; }
    .btn-scan { background:#10b981; } .btn-export { background:#2563eb; } .btn-import { background:#64748b; } .btn-clear { background:#ef4444; }
    .main-content { flex:1; padding:26px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .card { background:#fff; border-radius:28px; padding:30px; box-shadow:0 15px 35px rgba(0,0,0,.06); max-width:1100px; margin:0 auto; }
    .welcome-area { text-align:center; padding:60px 20px; color:#475569; }
    .welcome-area h1 { font-family:'Kanit'; margin:0 0 12px; }
    .action-bar { display:flex; justify-content:flex-end; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
    .btn-action { background:#f1f5f9; padding:10px 18px; border-radius:40px; border:0; font-family:'Kanit'; cursor:pointer; }
    #courseName { font-family:'Kanit'; color:#1e293b; margin:0; font-size:clamp(1.35rem,4vw,2rem); }
    #courseType { color:#64748b; margin:6px 0 20px; }
    .course-view { text-align:center; }
    .course-view img { width:auto; max-width:100%; max-height:calc(100dvh - 210px); border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,.1); border:1px solid #e2e8f0; object-fit:contain; }
    #editArea input { width:100%; padding:12px; margin:10px 0; border-radius:12px; border:1px solid #cbd5e1; }
    .db-badge { position:fixed; right:12px; bottom:calc(12px + var(--safe-bottom)); background:#1e293b; color:#fff; padding:7px 13px; border-radius:999px; font-size:.75rem; z-index:99; }
    .fullscreen-mode .sidebar,.fullscreen-mode .db-badge { display:none!important; } .fullscreen-mode .main-content { padding:0; } .fullscreen-mode .card { border-radius:0; max-width:100%; min-height:100dvh; }
    @media (max-width: 820px) {
      body { display:block; overflow:auto; min-height:100dvh; }
      .sidebar { width:100%; min-height:auto; max-height:none; }
      .sidebar-header { position:sticky; top:0; background:#1e293b; z-index:5; }
      .kpi-box { padding:10px 12px; }
      .subject-list { max-height:42dvh; padding-bottom:4px; }
      .data-panel { grid-template-columns:1fr 1fr; padding-bottom:12px; }
      .data-panel .btn-scan, .data-panel .btn-clear { grid-column:1 / -1; }
      .main-content { padding:14px 12px calc(72px + var(--safe-bottom)); overflow:visible; }
      .card { border-radius:20px; padding:18px; }
      .welcome-area { padding:28px 14px; }
      .action-bar { justify-content:stretch; }
      .btn-action { flex:1; min-height:44px; }
      .course-view img { max-height:none; width:100%; }
      .db-badge { left:12px; right:12px; text-align:center; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header"><h2>KM SMART HUB</h2><div style="font-size:.78rem;color:#94a3b8">ระบบจัดการองค์ความรู้</div></div>
    <button class="add-btn" onclick="createNewCourse()">+ เพิ่มวิชาใหม่</button>
    <div class="kpi-box">
      <div class="kpi-card active" id="kpiMF" onclick="filterCategory('MF')"><h5>จันทร์-ศุกร์</h5><div class="count" id="countMF">0</div></div>
      <div class="kpi-card" id="kpiSS" onclick="filterCategory('SS')"><h5>เสาร์-อาทิตย์</h5><div class="count" id="countSS">0</div></div>
    </div>
    <div class="subject-list" id="subjectList"><div style="color:#94a3b8;text-align:center;padding:20px">กำลังโหลดข้อมูล...</div></div>
    <div class="data-panel">
      <button class="btn-scan" onclick="seedDefaultCourses(true)">โหลดข้อมูลตั้งต้น</button>
      <button class="btn-export" onclick="exportAllData()">Export JSON</button>
      <button class="btn-import" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <button class="btn-clear" onclick="clearDatabase()">ล้างข้อมูลทั้งหมด</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="handleImport(event)">
    </div>
  </div>
  <main class="main-content">
    <section id="welcomeScreen" class="card welcome-area">
      <h1>ยินดีต้อนรับ</h1>
      <p>ระบบพร้อมใช้งานบนมือถือ iOS / Android / Desktop</p>
      <p style="margin-top:14px;font-size:.92rem">ข้อมูลรายวิชาจะโหลดจากชุดข้อมูลตั้งต้น และสามารถ Import/Export JSON ได้</p>
    </section>
    <section id="coursePanel" class="card" style="display:none">
      <div class="action-bar"><button class="btn-action" onclick="toggleFullscreen()">เปิดแบบเต็มจอ</button><button class="btn-action" onclick="enableEditMode()">✏️ แก้ไขข้อมูล</button></div>
      <div id="displayArea"><h2 id="courseName"></h2><p id="courseType"></p><div class="course-view"><img id="courseImage" alt=""></div></div>
      <div id="editArea" style="display:none"><h3>✏️ แก้ไขรายวิชา</h3><input id="editName" placeholder="ชื่อวิชา"><input type="file" id="editImageUpload" accept="image/*"><div style="display:flex;gap:10px;margin-top:12px"><button class="btn-action" style="background:#10b981;color:white" onclick="saveEdit()">บันทึก</button><button class="btn-action" onclick="cancelEdit()">ยกเลิก</button></div></div>
    </section>
  </main>

const DB_NAME='KMSmartHub'; const STORE_NAME='courses'; let db=null; let currentFilter='MF'; let currentCourseId=null;
function cleanName(fileName){ return fileName.replace(/\.(jpg|jpeg|png|gif|webp)$/i,'').replace(/-(mf|ss)$/i,'').replace(/[-_]+/g,' ').replace(/\s+/g,' ').trim(); }
function normalizeCourse(c){ const file=(c.imageUrl||'').split('/').pop()||c.name||''; const type=c.type || (/[-_]ss\./i.test(file)?'SS':'MF'); return {...c,id:c.id||('img_'+file.replace(/\./g,'_')),name:c.name && !/\s(mf|ss)$/i.test(c.name)?c.name:cleanName(file),type,imageUrl:c.imageUrl||('/km-smart-hub/courses-img/'+file),createdAt:c.createdAt||new Date().toISOString()}; }
function openDB(){return new Promise((resolve,reject)=>{ if(!('indexedDB' in window)) return reject(new Error('IndexedDB not supported')); const r=indexedDB.open(DB_NAME,2); r.onerror=()=>reject(r.error); r.onsuccess=()=>{db=r.result; resolve(db)}; r.onupgradeneeded=e=>{const d=e.target.result; if(!d.objectStoreNames.contains(STORE_NAME)) d.createObjectStore(STORE_NAME,{keyPath:'id'});}; });}
function txStore(mode='readonly'){ return db.transaction(STORE_NAME,mode).objectStore(STORE_NAME); }
async function getAllCourses(){return new Promise((res,rej)=>{const req=txStore().getAll(); req.onsuccess=()=>res(req.result||[]); req.onerror=()=>rej(req.error);});}
async function saveCourse(course){return new Promise((res,rej)=>{const req=txStore('readwrite').put(normalizeCourse(course)); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error);});}
async function deleteCourseById(id){return new Promise((res,rej)=>{const req=txStore('readwrite').delete(id); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error);});}
async function clearAllCourses(){const all=await getAllCourses(); for(const c of all) await deleteCourseById(c.id);}
async function seedDefaultCourses(showAlert=false){let added=0,updated=0; const existing=new Set((await getAllCourses()).map(c=>c.id)); for(const raw of DEFAULT_COURSES){ const c=normalizeCourse(raw); await saveCourse(c); existing.has(c.id)?updated++:added++; } await refreshUI(); if(showAlert) alert(`โหลดข้อมูลสำเร็จ: เพิ่ม ${added} / อัปเดต ${updated} รายการ`);}
async function refreshUI(){ if(!db) return; const courses=(await getAllCourses()).map(normalizeCourse).sort((a,b)=>a.name.localeCompare(b.name,'th')); document.getElementById('countMF').textContent=courses.filter(c=>c.type==='MF').length; document.getElementById('countSS').textContent=courses.filter(c=>c.type==='SS').length; document.getElementById('dbStatus').textContent=`IndexedDB: ${courses.length} รายการ`; const filtered=courses.filter(c=>c.type===currentFilter); const box=document.getElementById('subjectList'); if(!filtered.length){box.innerHTML='<div style="color:#94a3b8;text-align:center;padding:20px">ไม่มีข้อมูลในหมวดนี้</div>';return} box.innerHTML=filtered.map(c=>`<div class="subject-item ${currentCourseId===c.id?'active':''}" onclick="selectCourse('${c.id.replace(/'/g,"\'")}')"><span>${c.name}</span><button class="btn-danger-sm" onclick="event.stopPropagation();deleteCourse('${c.id.replace(/'/g,"\'")}')">ลบ</button></div>`).join(''); }
async function selectCourse(id){const courses=await getAllCourses(); const c=normalizeCourse(courses.find(x=>x.id===id)||{}); if(!c.id) return; currentCourseId=id; welcomeScreen.style.display='none'; coursePanel.style.display='block'; displayArea.style.display='block'; editArea.style.display='none'; courseName.textContent=c.name; courseType.textContent=c.type==='MF'?'หลักสูตร จันทร์-ศุกร์':'หลักสูตร เสาร์-อาทิตย์'; courseImage.src=c.imageUrl; courseImage.alt=c.name; await refreshUI(); if(matchMedia('(max-width: 820px)').matches) coursePanel.scrollIntoView({behavior:'smooth',block:'start'});}
function filterCategory(type){currentFilter=type; kpiMF.classList.toggle('active',type==='MF'); kpiSS.classList.toggle('active',type==='SS'); refreshUI();}
async function createNewCourse(){const name=prompt('ชื่อวิชา:','วิชาใหม่'); if(!name) return; const c={id:'course_'+Date.now(),name,type:currentFilter,imageUrl:'',createdAt:new Date().toISOString()}; await saveCourse(c); await refreshUI(); await selectCourse(c.id);}
async function deleteCourse(id){if(!confirm('ลบรายวิชานี้ใช่ไหม?')) return; await deleteCourseById(id); if(currentCourseId===id){currentCourseId=null; welcomeScreen.style.display='block'; coursePanel.style.display='none';} await refreshUI();}
function enableEditMode(){ if(!currentCourseId) return; displayArea.style.display='none'; editArea.style.display='block'; editName.value=courseName.textContent; editImageUpload.value=''; }
async function saveEdit(){ if(!currentCourseId) return; const courses=await getAllCourses(); const c=courses.find(x=>x.id===currentCourseId); if(!c) return; c.name=editName.value.trim()||c.name; const file=editImageUpload.files[0]; if(file){ const reader=new FileReader(); reader.onload=async e=>{c.imageUrl=e.target.result; await saveCourse(c); await selectCourse(currentCourseId);}; reader.readAsDataURL(file); } else { await saveCourse(c); await selectCourse(currentCourseId); } }
function cancelEdit(){ if(currentCourseId) selectCourse(currentCourseId); else editArea.style.display='none'; }
async function exportAllData(){const data=JSON.stringify(await getAllCourses(),null,2); const blob=new Blob([data],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`km_backup_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);}
async function handleImport(event){try{const file=event.target.files[0]; if(!file) return; const imported=JSON.parse(await file.text()); if(!Array.isArray(imported)) throw new Error('JSON ต้องเป็น Array'); for(const item of imported) if(item.id||item.name) await saveCourse(item); await refreshUI(); alert('นำเข้าข้อมูลสำเร็จ');}catch(e){alert('ไฟล์ไม่ถูกต้อง: '+e.message)}finally{event.target.value='';}}
async function clearDatabase(){if(!confirm('⚠️ ลบข้อมูลทั้งหมดในระบบใช่ไหม?')) return; await clearAllCourses(); currentCourseId=null; welcomeScreen.style.display='block'; coursePanel.style.display='none'; await refreshUI();}
function toggleFullscreen(){document.body.classList.toggle('fullscreen-mode'); const el=document.documentElement; if(!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen().catch(()=>{}); else if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});}
window.addEventListener('load',async()=>{try{await openDB(); if((await getAllCourses()).length===0) await seedDefaultCourses(false); await refreshUI(); filterCategory('MF');}catch(e){dbStatus.textContent='ไม่สามารถใช้ IndexedDB ได้'; alert('iOS อาจอยู่ใน Private Mode หรือบล็อกพื้นที่จัดเก็บ: '+e.message);}});
</script>
