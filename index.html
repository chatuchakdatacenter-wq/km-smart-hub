<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KM Smart Hub</title>

  <style>
    body{
      margin:0;
      font-family:Tahoma,sans-serif;
      background:#f5f7fb;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }

    .card{
      background:#fff;
      width:420px;
      border-radius:24px;
      padding:40px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
    }

    h1{
      color:#005C46;
      margin-bottom:12px;
    }

    p{
      color:#666;
      margin-bottom:28px;
    }

    .btn{
      display:inline-block;
      background:#005C46;
      color:#fff;
      padding:14px 28px;
      border-radius:14px;
      text-decoration:none;
      font-size:18px;
      transition:.25s;
    }

    .btn:hover{
      transform:translateY(-2px);
      opacity:.9;
    }

    img{
      width:120px;
      margin-bottom:20px;
    }
  </style>
</head>

<body>

  <div class="card">

    <img src="home.jpg" alt="KM Smart Hub">

    <h1>KM Smart Hub</h1>

    <p>
      ระบบจัดการองค์ความรู้และข้อมูลดิจิทัล
    </p>

    <a class="btn" href="km_hub.html">
      เข้าสู่ระบบ
    </a>

  </div>

</body>
</html>
