<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM Smart Hub - รูปภาพวิชา</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --sidebar-bg: #0f172a;
            --card-mf: #3b82f6;
            --card-ss: #f59e0b;
        }
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            overflow: hidden;
        }
        .exit-present {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--danger);
            color: white;
            z-index: 10001;
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid white;
            cursor: pointer;
            font-family: 'Kanit';
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .kpi-wrapper {
            padding: 10px 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .kpi-card {
            padding: 8px 5px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            text-align: center;
            color: white;
        }
        .kpi-card h5 {
            margin: 0;
            font-size: 0.7rem;
            opacity: 0.9;
        }
        .kpi-card div {
            font-size: 1.2rem !important;
            font-weight: bold;
        }
        .kpi-card.active {
            border-color: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            transform: scale(1.02);
        }
        .subject-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }
        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
            transition: 0.2s;
        }
        .subject-item.active {
            background: var(--primary);
        }
        .item-tools {
            display: flex;
            gap: 8px;
            opacity: 0;
        }
        .subject-item:hover .item-tools {
            opacity: 1;
        }
        .data-management {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
        }
        .btn-data {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Kanit';
            margin-bottom: 5px;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }
        .btn-data:hover {
            transform: translateY(-2px);
        }
        .btn-json-load {
            background: #10b981;
            color: white;
        }
        .btn-json-load:hover {
            background: #059669;
        }
        #main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .content-card {
            background: white;
            padding: 45px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 1200px;
            width: 90%;
        }
        .course-image-view {
            text-align: center;
        }
        .course-image-view img {
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Kanit';
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .db-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 5px;
            font-size: 0.7rem;
            z-index: 9999;
            display: none;
        }
        .db-status.success {
            background: #10b981;
        }
        .db-status.warning {
            background: #f59e0b;
        }
        .db-status.error {
            background: #ef4444;
        }
        .instructor-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 25px;
        }
        .welcome-box {
            text-align: center;
            color: #94a3b8;
            padding: 50px;
        }
        .welcome-box h1 {
            font-family: 'Kanit';
            color: var(--primary);
        }
        #editorArea {
            margin-top: 20px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
        }
        #editSubjectName {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Sarabun';
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="db-status" id="dbStatus">IndexedDB: Connected</div>
<button class="exit-present" onclick="exitFullPresentation()">❌ จบการนำเสนอ (ESC)</button>

<!-- Sidebar -->
<div id="sidebar">
    <div class="sidebar-header">
        <h2 style="font-family:'Kanit'; color:#38bdf8; margin:0;">KM SMART HUB</h2>
        <div id="storageInfo" style="font-size:0.7rem; color:#94a3b8; margin-top:5px;">✓ พร้อมใช้งาน</div>
    </div>

    <button class="btn" style="background:var(--success); color:white; margin:15px; justify-content:center;" onclick="addNewSubject()">+ เพิ่มวิชาใหม่</button>

    <div class="kpi-wrapper">
        <div class="kpi-card active" id="kpiMF" style="background:var(--card-mf);" onclick="setCategory('MF')">
            <h5>จันทร์ - ศุกร์</h5>
            <div id="countMF">0</div>
        </div>
        <div class="kpi-card" id="kpiSS" style="background:var(--card-ss);" onclick="setCategory('SS')">
            <h5>เสาร์ - อาทิตย์</h5>
            <div id="countSS">0</div>
        </div>
    </div>

    <div id="subjectList" class="subject-container"></div>

    <div class="data-management">
        <button class="btn-data btn-json-load" onclick="scanImagesFromFolder()">📂 สแกนรูปภาพจากโฟลเดอร์</button>
        <button class="btn-data" style="background:var(--primary); color:white;" onclick="exportData()">📤 Export ข้อมูล</button>
        <button class="btn-data" style="background:var(--secondary); color:white;" onclick="importTrigger()">📥 Import ข้อมูล</button>
        <button class="btn-data" style="background:#ef4444; color:white;" onclick="clearAllData()">🗑️ ล้างข้อมูลทั้งหมด</button>
    </div>
    <input type="file" id="fileInput" style="display:none" accept=".json" onchange="processImport(this)">
</div>

<!-- Main Content -->
<div id="main">
    <div id="welcome" class="welcome-box">
        <h1>📸 ยินดีต้อนรับ</h1>
        <p>คลิกปุ่ม "📂 สแกนรูปภาพจากโฟลเดอร์" เพื่อโหลดรายวิชาทั้งหมด</p>
        <p style="font-size:0.9rem;">หรือเลือกวิชาจากเมนูด้านซ้าย</p>
    </div>

    <div class="content-card" id="contentCard" style="display:none;">
        <div class="action-bar">
            <button class="btn" style="background: #1e293b; color: white;" onclick="enterFullPresentation()">🖥️ นำเสนอ</button>
            <button class="btn" style="background: #e2e8f0;" onclick="enableEditMode()">✏️ แก้ไขชื่อ/รูป</button>
        </div>

        <div class="instructor-card" id="instructorArea" style="display:none;">
            <div>
                <h3 id="viewTitle"></h3>
                <p id="viewCourseType"></p>
            </div>
        </div>

        <div class="course-image-view">
            <img id="courseMainImage" style="max-width:100%; border-radius:16px;">
        </div>

        <div id="editorArea" style="display:none;">
            <h4>✏️ แก้ไขข้อมูลวิชา</h4>
            <input type="text" id="editSubjectName" placeholder="ชื่อวิชา">
            <br><br>
            <label>เปลี่ยนรูปภาพ:</label>
            <input type="file" id="editImageFile" accept="image/*">
            <br><br>
            <button class="btn" style="background:var(--success); color:white;" onclick="saveEditedSubject()">💾 บันทึก</button>
            <button class="btn" style="background:#cbd5e1;" onclick="cancelEdit()">ยกเลิก</button>
        </div>
    </div>
</div>

<script>
    // ===============================
    // DATABASE CONFIGURATION
    // ===============================
    const DB_NAME = 'KM_SmartHub_DB';
    const STORE_NAME = 'subjects';
    const DB_VERSION = 3;
    let db;
    let currentCategory = 'MF';
    let currentActiveId = "";

    // ===============================
    // INDEXEDDB OPERATIONS
    // ===============================
    const dbOp = {
        save: (data) => new Promise((resolve, reject) => {
            if (!db) { reject(new Error("Database not initialized")); return; }
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(data);
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e.target.error);
        }),
        get: (id) => new Promise((resolve, reject) => {
            if (!db) { reject(new Error("Database not initialized")); return; }
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).get(id);
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = (e) => reject(e.target.error);
        }),
        getAll: () => new Promise((resolve, reject) => {
            if (!db) { reject(new Error("Database not initialized")); return; }
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).getAll();
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = (e) => reject(e.target.error);
        }),
        delete: (id) => new Promise((resolve, reject) => {
            if (!db) { reject(new Error("Database not initialized")); return; }
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).delete(id);
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e.target.error);
        }),
        count: () => new Promise((resolve, reject) => {
            if (!db) { reject(new Error("Database not initialized")); return; }
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).count();
            req.onsuccess = () => resolve(req.result);
            req.onerror = (e) => reject(e.target.error);
        }),
        clearAll: () => new Promise((resolve, reject) => {
            if (!db) { reject(new Error("Database not initialized")); return; }
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).clear();
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e.target.error);
        })
    };

    // ===============================
    // INITIALIZE DATABASE
    // ===============================
    async function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                resolve(db);
            };
            request.onerror = (e) => reject(e.target.error);
        });
    }

    // ===============================
    // 📂 สแกนรูปภาพจากโฟลเดอร์ courses-img
    // ===============================
    async function scanImagesFromFolder() {
        const statusDiv = document.getElementById('dbStatus');
        statusDiv.style.display = 'block';
        statusDiv.textContent = '⏳ กำลังสแกนรูปภาพ...';
        statusDiv.className = 'db-status warning';

        // 🔧 แก้ไขรายชื่อนี้ให้ตรงกับไฟล์รูปภาพของคุณ!
        const imageFiles = [
            "basic-computer.jpg",
            "computer-repair.jpg",
            "graphic-design.jpg",
            "flower-arrangement-mf.jpg",
            "scented-clay-flower.jpg",
            "haircut-men.jpg",
            "womens-sewing.jpg",
            "batik-tiedye.jpg",
            "herbal-processing.jpg",
            "nail-art.jpg",
            "contemporary-craft.jpg",
            "beauty-women.jpg",
            "beautician.jpg",
            "applied-astrology.jpg",
            "thai-snacks-desserts.jpg",
            "homemade-cafe.jpg",
            "fancy-candle.jpg",
            "patchwork-quilting.jpg"
        ];

        const basePath = '/km-smart-hub/courses-img/';
        let importedCount = 0;
        let skippedCount = 0;

        for (let fileName of imageFiles) {
            let name = fileName.replace(/\.(jpg|jpeg|png|gif)$/i, '').replace(/-/g, ' ');
            let type = 'MF';
            if (fileName.includes('-ss')) type = 'SS';
            else if (fileName.includes('-mf')) type = 'MF';
            
            const id = 'img_' + fileName.replace(/\./g, '_');
            const existing = await dbOp.get(id);
            
            if (!existing) {
                await dbOp.save({
                    id: id,
                    name: name,
                    type: type,
                    imageUrl: basePath + fileName,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
                importedCount++;
            } else {
                skippedCount++;
            }
        }

        await refreshUI();
        
        statusDiv.textContent = `✅ สแกนเสร็จ นำเข้า ${importedCount} วิชา (ซ้ำ ${skippedCount})`;
        statusDiv.className = 'db-status success';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
        
        alert(`📂 สแกนรูปภาพสำเร็จ!\n\n✅ นำเข้าใหม่: ${importedCount} วิชา\n⏭️ มีอยู่แล้ว: ${skippedCount} วิชา`);
        
        if (importedCount > 0) {
            const all = await dbOp.getAll();
            const firstItem = all.find(d => (d.type || 'MF') === currentCategory);
            if (firstItem) loadSubject(firstItem.id);
        }
    }

    // ===============================
    // CORE FUNCTIONS
    // ===============================
    async function refreshUI() {
        const all = await dbOp.getAll();
        let mf = 0, ss = 0;
        all.forEach(d => {
            if (d.type === 'SS') ss++;
            else mf++;
        });
        document.getElementById('countMF').innerText = mf;
        document.getElementById('countSS').innerText = ss;
        renderSidebar();
    }

    async function renderSidebar() {
        const list = document.getElementById('subjectList');
        list.innerHTML = "";
        const all = await dbOp.getAll();
        const filtered = all.filter(d => (d.type || 'MF') === currentCategory);
        
        if (filtered.length === 0) {
            list.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:20px;">ยังไม่มีวิชา<br><small>คลิก "สแกนรูปภาพ" หรือ "เพิ่มวิชาใหม่"</small></div>';
            return;
        }
        
        filtered.forEach(data => {
            const div = document.createElement('div');
            div.className = `subject-item ${data.id === currentActiveId ? 'active' : ''}`;
            div.innerHTML = `
                <span style="flex:1" onclick="loadSubject('${data.id}')">${data.name}</span>
                <div class="item-tools">
                    <button style="color:white;background:none;border:none;cursor:pointer;" onclick="deleteSub(event, '${data.id}')">🗑️</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.getElementById('kpiMF').classList.toggle('active', cat === 'MF');
        document.getElementById('kpiSS').classList.toggle('active', cat === 'SS');
        refreshUI();
    }

    async function loadSubject(id) {
        currentActiveId = id;
        const data = await dbOp.get(id);
        if (!data) return;
        
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('contentCard').style.display = 'block';
        
        // ตรวจสอบและซ่อน editorArea ถ้ามี
        const editorArea = document.getElementById('editorArea');
        if (editorArea) editorArea.style.display = 'none';
        
        document.getElementById('viewTitle').innerText = data.name || "";
        document.getElementById('viewCourseType').innerText = data.type === 'SS' ? 'หลักสูตร เสาร์-อาทิตย์' : 'หลักสูตร จันทร์-ศุกร์';
        const mainImage = document.getElementById('courseMainImage');
        if (mainImage) mainImage.src = data.imageUrl || "";
        
        renderSidebar();
    }

    async function addNewSubject() {
        const name = prompt("ชื่อวิชาใหม่:");
        if (name && name.trim()) {
            const newId = 'subject_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            await dbOp.save({
                id: newId,
                name: name.trim(),
                type: currentCategory,
                imageUrl: "",
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            });
            await refreshUI();
            loadSubject(newId);
        }
    }

    async function deleteSub(e, id) {
        e.stopPropagation();
        if (confirm("ยืนยันลบวิชานี้?")) {
            await dbOp.delete(id);
            if (currentActiveId === id) {
                document.getElementById('welcome').style.display = 'block';
                document.getElementById('contentCard').style.display = 'none';
                currentActiveId = "";
            }
            await refreshUI();
        }
    }

    function enableEditMode() {
        const editorArea = document.getElementById('editorArea');
        if (editorArea) editorArea.style.display = 'block';
        document.getElementById('editSubjectName').value = document.getElementById('viewTitle').innerText;
    }

    async function saveEditedSubject() {
        const newName = document.getElementById('editSubjectName').value;
        const file = document.getElementById('editImageFile').files[0];
        const data = await dbOp.get(currentActiveId);
        
        if (data) {
            data.name = newName || data.name;
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    data.imageUrl = e.target.result;
                    data.updatedAt = new Date().toISOString();
                    await dbOp.save(data);
                    await refreshUI();
                    await loadSubject(currentActiveId);
                };
                reader.readAsDataURL(file);
            } else {
                data.updatedAt = new Date().toISOString();
                await dbOp.save(data);
                await loadSubject(currentActiveId);
            }
        }
        cancelEdit();
    }

    function cancelEdit() {
        const editorArea = document.getElementById('editorArea');
        if (editorArea) editorArea.style.display = 'none';
        loadSubject(currentActiveId);
    }

    function enterFullPresentation() {
        document.documentElement.requestFullscreen().catch(() => {});
        document.body.classList.add('present-mode');
    }

    function exitFullPresentation() {
        if (document.fullscreenElement) document.exitFullscreen();
        document.body.classList.remove('present-mode');
    }

    async function exportData() {
        const all = await dbOp.getAll();
        const exportObj = {
            version: '3.0',
            exportDate: new Date().toISOString(),
            count: all.length,
            data: all
        };
        const jsonString = JSON.stringify(exportObj, null, 2);
        const blob = new Blob([jsonString], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `km_courses_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function importTrigger() {
        document.getElementById('fileInput').click();
    }

    async function processImport(input) {
        if (!input.files[0]) return;
        const file = input.files[0];
        const text = await file.text();
        const importData = JSON.parse(text);
        
        let count = 0;
        if (importData.data && Array.isArray(importData.data)) {
            for (let item of importData.data) {
                if (item.id && item.name) {
                    await dbOp.save(item);
                    count++;
                }
            }
        } else if (Array.isArray(importData)) {
            for (let item of importData) {
                if (item.id && item.name) {
                    await dbOp.save(item);
                    count++;
                }
            }
        }
        
        await refreshUI();
        alert(`✅ Import สำเร็จ! นำเข้า ${count} รายการ`);
        input.value = '';
    }

    async function clearAllData() {
        if (confirm("⚠️ คำเตือน! การล้างข้อมูลจะลบวิชาทั้งหมดในระบบ\n\nยืนยันที่จะล้างข้อมูลทั้งหมด?")) {
            await dbOp.clearAll();
            document.getElementById('welcome').style.display = 'block';
            document.getElementById('contentCard').style.display = 'none';
            currentActiveId = "";
            await refreshUI();
            alert("🗑️ ลบข้อมูลทั้งหมดเรียบร้อยแล้ว");
        }
    }

    // ===============================
    // INITIALIZE
    // ===============================
    window.onload = async () => {
        await initDB();
        await refreshUI();
        setCategory('MF');
        
        const count = await dbOp.count();
        const statusDiv = document.getElementById('dbStatus');
        statusDiv.style.display = 'block';
        statusDiv.textContent = `IndexedDB: ${count} วิชา`;
        statusDiv.className = 'db-status';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
        
        if (count === 0) {
            console.log("ไม่มีข้อมูล แนะนำให้กดปุ่ม 'สแกนรูปภาพจากโฟลเดอร์'");
